faqs:
  - question: 完成品を加工してもいいですか？
    answer: >-
      ご自由にどうぞ。イラストを書き加えたり、レイアウトを大幅に変更しても構いません。ただし、履歴書下部の著作権表示（特にTwemoji）はライセンス上削除しないようにご注意ください。

  - question: 入力内容は自動で保存されますか？
    answer: >-
      入力内容はこのブラウザへ自動保存されます。ただし、プライベートブラウズ中やブラウザの設定によっては保存できない場合があります。端末の変更やデータ消失に備える場合は、入力欄の下にあるバックアップ機能もご利用ください。

  - question: 入力した内容や画像は外部へ送信・保存されますか？
    answer: >-
      送信されません。このジェネレーターはブラウザ内だけで動作し、入力したプロフィールやアイコン画像をサーバーへアップロードしません。そのため、バックアップはご自身で行ってください。

  - question: アイコン画像だけ保存されないことがあるのはなぜですか？
    answer: >-
      画像のデータ量がブラウザの保存上限を超えると、プロフィール項目だけを自動保存します。その場合も現在の画面では画像を使えますが、ページを閉じる前にバックアップファイルを保存しておくと安心です。

  - question: GIFやAPNGなどの動く画像も使えますか？
    answer: >-
      GIF・APNG・アニメーションWebPをアイコン画像として使用できます。プレビューが動き、GIFまたはAPNG形式でも保存できます。読み込めるアニメーション画像は15MB以下です。
